<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD vs PAXGUSDT Price Comparison</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .price-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }
        
        .asset-name {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .asset-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .xau-icon {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333;
        }
        
        .paxg-icon {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
        }
        
        .price-value {
            font-size: 2.2em;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }
        
        .price-change {
            font-size: 1.1em;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        
        .positive {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .negative {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }
        
        .neutral {
            background: rgba(158, 158, 158, 0.2);
            color: #9E9E9E;
        }
        
        .difference-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            grid-column: 1 / -1;
        }
        
        .difference-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        .difference-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }
        
        .difference-positive {
            color: #4CAF50;
        }
        
        .difference-negative {
            color: #F44336;
        }
        
        .last-updated {
            text-align: center;
            margin-top: 30px;
            opacity: 0.8;
            font-style: italic;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 20px auto;
            display: block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
            opacity: 0.7;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥇 XAUUSD vs PAXGUSDT Price Comparison</h1>
        
        <div class="comparison-grid">
            <div class="price-card">
                <div class="asset-name">
                    <div class="asset-icon xau-icon">Au</div>
                    XAU/USD (Spot Gold)
                </div>
                <div class="price-value" id="xau-price">Loading...</div>
                <div class="price-change neutral" id="xau-change">--</div>
                <div style="margin-top: 15px; font-size: 0.9em; opacity: 0.8;">
                    Source: Twelve Data / GoldAPI.io
                </div>
            </div>
            
            <div class="price-card">
                <div class="asset-name">
                    <div class="asset-icon paxg-icon">P</div>
                    PAXG/USDT (Paxos Gold)
                </div>
                <div class="price-value" id="paxg-price">Loading...</div>
                <div class="price-change neutral" id="paxg-change">--</div>
                <div style="margin-top: 15px; font-size: 0.9em; opacity: 0.8;">
                    Source: Binance API
                </div>
            </div>
            
            <div class="difference-card">
                <div class="difference-title">Price Difference Analysis</div>
                <div class="difference-value" id="price-difference">Calculating...</div>
                <div id="difference-details">
                    <div>Premium/Discount: <span id="premium-discount">--</span></div>
                    <div>Arbitrage Opportunity: <span id="arbitrage-opportunity">--</span></div>
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="updatePrices()">🔄 Refresh Prices</button>
        
        <div class="last-updated" id="last-updated">Last updated: Never</div>
    </div>

    <script>
        let xauPrice = null;
        let paxgPrice = null;
        
        // Configuration - Get your FREE API keys
        const TWELVE_DATA_API_KEY = 'bbb83d18a2ef43bc8d811c3ec4632e44'; // Your Twelve Data API key
        const GOLD_API_KEY = 'goldapi-fg1fa19mo2ttg4l-io'; // Your GoldAPI.io key
        
        // Fetch XAU/USD price from Twelve Data (primary) or GoldAPI.io (backup)
        async function fetchXAUPrice() {
            // Try Twelve Data first
            try {
                console.log('Fetching XAU/USD price from Twelve Data...');
                
                const response = await fetch(
                    `https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${TWELVE_DATA_API_KEY}`
                );
                
                if (!response.ok) {
                    throw new Error(`Twelve Data HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Check for API errors
                if (data.code || data.message) {
                    throw new Error(`Twelve Data error: ${data.message || data.code}`);
                }
                
                // Validate response structure
                if (!data.price || parseFloat(data.price) <= 0) {
                    throw new Error('Invalid price data from Twelve Data');
                }
                
                const price = parseFloat(data.price);
                xauPrice = price;
                
                document.getElementById('xau-price').textContent = `$${price.toFixed(2)}`;
                
                // Twelve Data doesn't provide change % in this endpoint, show "Live"
                const changeElement = document.getElementById('xau-change');
                changeElement.textContent = 'Live';
                changeElement.className = 'price-change neutral';
                
                console.log(`✓ Twelve Data success: $${price.toFixed(2)}`);
                return price;
                
            } catch (error) {
                console.warn('Twelve Data failed:', error.message);
                
                // Fallback to GoldAPI.io
                console.log('Falling back to GoldAPI.io...');
                return await fetchFromGoldAPI();
            }
        }
        
        // Backup: Fetch from GoldAPI.io
        async function fetchFromGoldAPI() {
            try {
                const response = await fetch('https://www.goldapi.io/api/XAU/USD', {
                    method: 'GET',
                    headers: {
                        'x-access-token': GOLD_API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`GoldAPI.io HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Check for API errors
                if (data.error) {
                    throw new Error(`GoldAPI.io error: ${data.error}`);
                }
                
                // Validate response structure
                if (!data.price || data.price <= 0) {
                    throw new Error('Invalid price data from GoldAPI.io');
                }
                
                const price = data.price;
                const change = data.chp || 0; // Change percentage
                
                xauPrice = price;
                
                document.getElementById('xau-price').textContent = `$${price.toFixed(2)}`;
                
                const changeElement = document.getElementById('xau-change');
                if (change !== 0) {
                    changeElement.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeElement.className = `price-change ${change >= 0 ? 'positive' : 'negative'}`;
                } else {
                    changeElement.textContent = 'Live';
                    changeElement.className = 'price-change neutral';
                }
                
                console.log(`✓ GoldAPI.io success: $${price.toFixed(2)}`);
                return price;
                
            } catch (error) {
                console.error('GoldAPI.io also failed:', error.message);
                
                // Show helpful error message
                document.getElementById('xau-price').textContent = 'API Error';
                document.getElementById('xau-change').textContent = 'Check Keys';
                document.getElementById('xau-change').className = 'price-change negative';
                
                // Display setup instructions in console
                console.log('%c=== API Setup Instructions ===', 'color: #FFD700; font-size: 16px; font-weight: bold;');
                console.log('Primary: Twelve Data');
                console.log('1. Visit: https://twelvedata.com/');
                console.log('2. Sign up for FREE account (800 calls/day)');
                console.log('3. Get your API key from dashboard');
                console.log('4. Replace TWELVE_DATA_API_KEY in this HTML file');
                console.log('');
                console.log('Backup: GoldAPI.io');
                console.log('1. Visit: https://www.goldapi.io/');
                console.log('2. Sign up for FREE account (100 calls/month)');
                console.log('3. Get your API key from dashboard');
                console.log('4. Replace GOLD_API_KEY in this HTML file');
                console.log('=====================================');
                
                return null;
            }
        }
        
        // Fetch PAXG/USDT price from Binance API
        async function fetchPAXGPrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);
                
                paxgPrice = price;
                
                document.getElementById('paxg-price').textContent = `$${price.toFixed(2)}`;
                
                const changeElement = document.getElementById('paxg-change');
                changeElement.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeElement.className = `price-change ${change >= 0 ? 'positive' : 'negative'}`;
                
                return price;
            } catch (error) {
                console.error('Error fetching PAXG price:', error);
                document.getElementById('paxg-price').textContent = 'Error';
                document.getElementById('paxg-change').textContent = 'Failed to load';
                document.getElementById('paxg-change').className = 'price-change negative';
                return null;
            }
        }
        
        // Calculate and display the difference
        function calculateDifference() {
            if (xauPrice && paxgPrice) {
                const difference = xauPrice - paxgPrice;
                const percentageDiff = ((difference / paxgPrice) * 100).toFixed(2);
                
                const diffElement = document.getElementById('price-difference');
                const premiumElement = document.getElementById('premium-discount');
                const arbitrageElement = document.getElementById('arbitrage-opportunity');
                
                diffElement.textContent = `$${Math.abs(difference).toFixed(2)}`;
                diffElement.className = `difference-value ${difference >= 0 ? 'difference-positive' : 'difference-negative'}`;
                
                if (difference > 0) {
                    premiumElement.textContent = `XAUUSD is trading at a ${percentageDiff}% premium to PAXGUSDT`;
                    arbitrageElement.textContent = `Potential arbitrage: Sell XAUUSD, Buy PAXGUSDT`;
                } else if (difference < 0) {
                    premiumElement.textContent = `XAUUSD is trading at a ${Math.abs(percentageDiff)}% discount to PAXGUSDT`;
                    arbitrageElement.textContent = `Potential arbitrage: Buy XAUUSD, Sell PAXGUSDT`;
                } else {
                    premiumElement.textContent = `Prices are equal`;
                    arbitrageElement.textContent = `No arbitrage opportunity`;
                }
            } else {
                document.getElementById('price-difference').textContent = 'Insufficient data';
                document.getElementById('premium-discount').textContent = '--';
                document.getElementById('arbitrage-opportunity').textContent = '--';
            }
        }
        
        // Update all prices
        async function updatePrices() {
            document.getElementById('xau-price').textContent = 'Loading...';
            document.getElementById('paxg-price').textContent = 'Loading...';
            document.getElementById('price-difference').textContent = 'Calculating...';
            
            await Promise.all([fetchXAUPrice(), fetchPAXGPrice()]);
            calculateDifference();
            
            // Update timestamp
            const now = new Date();
            document.getElementById('last-updated').textContent = 
                `Last updated: ${now.toLocaleString()}`;
        }
        
        // Auto-refresh every 30 seconds
        setInterval(updatePrices, 30000);
        
        // Initial load
        updatePrices();
    </script>
</body>
</html>
